name: Brew Audit
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  audit:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Homebrew Audit
        run: |
          brew audit --strict --online Formula/porsche-ev.rb
      - name: Homebrew Test
        run: |
          brew install --build-from-source Formula/porsche-ev.rb
          brew test porsche-ev
